<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Mercadinho Online</title>
</head>
<body>

    <header>
        <h1>🛒 Mercadinho</h1>
        <button class="btn-tmh" id="btn-carrinho">🛒 Carrinho</button>
    </header>

    <div id="toast" class="toast"></div>

    <main>

        <div class="categorias">
            <button class="categoria-btn ativo" onclick="filtrarCategoria('Todos', this)">Todos</button>
            <button class="categoria-btn" onclick="filtrarCategoria('Mercearia', this)">Mercearia</button>
            <button class="categoria-btn" onclick="filtrarCategoria('Bebidas', this)">Bebidas</button>
            <button class="categoria-btn" onclick="filtrarCategoria('Limpeza', this)">Limpeza</button>
        </div>

        <section class="produtos" id="lista-produtos"></section>
    </main>
    
    <div id="modal-carrinho" class="modal oculto">
        <div class="modal-box">
            <h2>🛒 Seu Carrinho</h2>
            <button class="btn-limpar" onclick="abrirConfirmacao()">🗑️ Limpar Carrinho</button>
            <ul id="lista-carrinho"></ul>
            <p id="total">Total: R$ 0</p>

            <button class="btn-voltar" onclick="fecharCarrinho()">Voltar</button>
            <button class="btn-continua" onclick="abrirModalCliente()">Continuar</button>
        </div>
    </div>

    <div id="modal" class="modal oculto">
        <div class="modal-box">

            <img id="img-principal">

            <h2 id="nome"></h2>
            <p id="descricao"></p>
            <p id="preco"></p>

            <button class="btn-voltar" onclick="fecharModal()" >Voltar</button>
            <button onclick="smsAdicionado()">Adicionar</button>

        </div>
    </div>

    <div id="modal-cliente" class="modal oculto">

        <div class="modal-box">

            <h2 class="titulo-form">Finalizar Pedido</h2>

            <div class="campo">
                <label>Nome</label>
                <input id="nomeCliente" placeholder="Seu nome..."><br><br>
            </div>
            <div class="campo">
                <label>Endereço</label>
                <input id="endereco" placeholder="Ex: Rua, Bairro..."><br><br>
            </div>
            <div class="campo">
                <label>N. da Casa</label>
                <input id="numeroCasa" placeholder="Ex: 123.."><br><br>
            </div>

            <div class="campo">
                <label>Telefone</label>
                <input id="telefone" placeholder="Ex: (85 9...)"><br><br>
            </div>

            <div class="campo">
                <label>Pagamento</label>
                <select id="pagamento">
                    <option value="">Forma de pagamento!</option>
                    <option value="Dinheiro">Dinheiro</option>
                    <option value="Pix">Pix</option>
                    <option value="Cartão">Cartão</option>
                </select><br><br>
            </div>

            <div class="campo">
                <label>Troco</label>
                <input id="troco" placeholder="Ex: 50 (se for dinheiro)"><br><br>
            </div>

            <div class="botoes-form">
                <button onclick="fecharModalCliente()">Voltar</button>
                <button onclick="enviarPedido()">Finalizar</button>

            </div>

        </div>

    </div>

    <div id="modal-confirmar" class="modal oculto">
        <div class="modal-box " >
            <h2>Tem certeza ?</h2>
            <p>Deseja apagar todos os itens do carrinho?</p>
            
            <div class="botoes-form">
                <button onclick="fecharConfirmacao()" >Não</button>
                <button class="btn-perigo" onclick="confirmarLimpeza()" >Sim, apagar</button>
            </div>
        </div>
    </div>

<script src="produtos.js"></script>
<script src="script.js"></script>

</body>
</html>
