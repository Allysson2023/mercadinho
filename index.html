<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Mercadinho Online</title>
</head>
<body>

    
    <header class="logo-marca">
        <h1>🛒 IFOOD 2</h1>
        <button class="btn-tmh" id="btn-carrinho">🛒 Carrinho</button>
    </header>
    <div id="tela-login">

        <h2>Login Admin</h2>
        
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="login()">Entra</button>
    </div>
    <main>

        <div class="promocoes">
            <div class="promo-container" id="lista-promocoes" ></div>
        </div>

        <div class="categorias">
            <button class="categoria-btn ativo" onclick="filtrarCategoria('Todos', this)">Todos</button>
            <button class="categoria-btn" onclick="filtrarCategoria('Mercearia', this)">Mercearia</button>
            <button class="categoria-btn" onclick="filtrarCategoria('Bebidas', this)">Bebidas</button>
            <button class="categoria-btn" onclick="filtrarCategoria('Limpeza', this)">Limpeza</button>
        </div>

    
    </main>

    <div id="sistema" style="display: none;" >
        <h1>Mercadinho</h1>

        <section class="produtos" id="lista-produtos"></section>

        <h2>Cadastrar Produto</h2>
    
        <form id="form-produto" enctype="multipart/form-data">

            <input type="text" id="nome" placeholder="Nome do Produto" required>
            <br><br>
    
            <input type="number" id="preco" placeholder="Preço" required> <br><br>
    
            <input type="file" id="imagem" required> <br><br>
    
            <button type="submit" >Cadastrar</button>
    
        </form>
    </div>

    <div id="toast" class="toast"></div>


    <hr>

    
    <div id="modal-carrinho" class="modal oculto">
        <div class="modal-box">
            <h2>🛒 Seu Carrinho</h2>
            <button class="btn-limpar" onclick="abrirConfirmacao()">🗑️ Limpar Carrinho</button>
            <ul id="lista-carrinho"></ul>
            <p id="total">Total: R$ 0</p>

            <button class="btn-voltar" onclick="fecharCarrinho()">Voltar</button>
            <button class="btn-continua" onclick="abrirModalCliente()">Continuar</button>
        </div>
    </div>

    <div id="modal" class="modal oculto">
        <div class="modal-box">

            <img id="img-principal">

            <h2 id="nome"></h2>
            <p id="descricao"></p>
            <p id="preco"></p>

            <button class="btn-voltar" onclick="fecharModal()" >Voltar</button>
            <button onclick="smsAdicionado()">Adicionar</button>

        </div>
    </div>

    <div id="modal-cliente" class="modal oculto">

        <div class="modal-box">

            <h2 class="titulo-form">Finalizar Pedido</h2>

            <div class="campo">
                <label>Nome</label>
                <input id="nomeCliente" placeholder="Seu nome..."><br><br>
            </div>
            <div class="campo">
                <label>Endereço</label>
                <input id="endereco" placeholder="Ex: Rua, Bairro..."><br><br>
            </div>
            <div class="campo">
                <label>N. da Casa</label>
                <input id="numeroCasa" placeholder="Ex: 123.."><br><br>
            </div>

            <div class="campo">
                <label>Telefone</label>
                <input id="telefone" placeholder="Ex: (85 9...)"><br><br>
            </div>

            <div class="campo">
                <label>Pagamento</label>
                <select id="pagamento">
                    <option value="">Forma de pagamento!</option>
                    <option value="Dinheiro">Dinheiro</option>
                    <option value="Pix">Pix</option>
                    <option value="Cartão">Cartão</option>
                </select><br><br>
            </div>

            <div class="campo" id="campo-troco">
                <label>Troco</label>
                <input id="troco" placeholder="Ex: 50 (se for dinheiro)"><br><br>
            </div>

            <div class="botoes-form">
                <button onclick="fecharModalCliente()">Voltar</button>
                <button onclick="enviarPedido()">Finalizar</button>

            </div>

        </div>

    </div>

    <div id="modal-confirmar" class="modal oculto">
        <div class="modal-box " >
            <h2>Tem certeza ?</h2>
            <p>Deseja apagar todos os itens do carrinho?</p>
            
            <div class="botoes-form">
                <button onclick="fecharConfirmacao()" >Não</button>
                <button class="btn-perigo" onclick="confirmarLimpeza()" >Sim, apagar</button>
            </div>
        </div>
    </div>

    <div id="modal-troco" class="modal oculto">
        <div class="modal-box">
            <h2>Precisa de troco?</h2>
            <p>Voce vai pagar em dinheiro?</p>

            <div class="botoes-form">
                <button onclick="naoPrecisaTroco()" >Não</button>
                <button class="btn-perigo" onclick="precisaTroco()" >Sim</button>
            </div>
        </div>
    </div>


    <script src="js/api.js" ></script>
    <script src="js/auth.js" ></script>
    <script src="js/produtos.js" ></script>
    <script src="js/carrinho.js" ></script>
    <script src="js/pedidos.js" ></script>
    <script src="js/ui.js" ></script>
<script src="js/app.js" ></script>

</body>
</html>
